# 主配置文件
server:
  port: 8080

spring:
  profiles:
    active: dev
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=20000,expireAfterWrite=24h
  application:
    name: cashier-backend
  servlet:
    multipart:
      # 手机原图可先完整上传，再由服务端压缩落盘（见 app.image-upload）
      max-file-size: 32MB
      max-request-size: 40MB
  mvc:
    trailing-slash-match: true
  web:
    resources:
      # 由 WebMvcConfig 统一注册静态资源与 SPA 回退，避免 /** 与默认链冲突
      add-mappings: false

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cashier.module.*.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Sa-Token 配置
sa-token:
  token-name: Authorization
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false
  token-prefix: Bearer

# Knife4j 接口文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

# 上传文件落盘目录（/uploads/** 映射到此目录；可用环境变量 APP_UPLOAD_DIR 覆盖）
app:
  upload-dir: ${APP_UPLOAD_DIR:${user.home}/cashier-uploads}
  # 图片上传：先接收 multipart，再压缩为 JPEG（失败则原样保存，如个别格式无法解码）
  image-upload:
    # 长边像素上限（等比缩小；已小于则基本不重采样）
    max-long-edge: 2048
    # JPEG 质量 0~1
    jpeg-quality: 0.82
